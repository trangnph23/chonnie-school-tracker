function CountdownBadge({ label, date, urgentThreshold=60, warnThreshold=120 }) {
  const days = Math.ceil((new Date(date) - new Date()) / (1000*60*60*24));
  const passed = days < 0;
  const urgent = !passed && days < urgentThreshold;
  const warn = !passed && days >= urgentThreshold && days < warnThreshold;
  const color = passed ? "#6c6c8a" : urgent ? "#ff6b6b" : warn ? "#ffaa44" : "#6b8cff";
  const bg = passed ? "#f0ebe3" : urgent ? "#fdecea" : warn ? "#fff3e0" : "#eef0fa";
  const border = passed ? "#d9d2c5" : urgent ? "#e08080" : warn ? "#e8a96a" : "#b8c4f5";
  const formatted = new Date(date).toLocaleDateString("en-AU", { day:"numeric", month:"short", year:"numeric" });
  const countText = passed ? `${Math.abs(days)}d ago` : days === 0 ? "Today!" : `${days}d`;
  return (
    <div style={{ background:bg, border:`1px solid ${border}`, borderRadius:8, padding:"6px 10px", minWidth:110, textAlign:"center" }}>
      <div style={{ fontSize:9, color:"#7a7a8a", textTransform:"uppercase", letterSpacing:1, fontFamily:"monospace", marginBottom:2 }}>{label}</div>
      <div style={{ fontSize:18, fontWeight:700, color, fontFamily:"monospace", lineHeight:1 }}>{passed ? "⚠️" : countText}</div>
      <div style={{ fontSize:10, color: passed ? "#6c6c8a" : color, marginTop:2 }}>{passed ? `Passed ${formatted}` : formatted}</div>
    </div>
  );
}

function ProgressBar({ total, done }) {
  const pct = total === 0 ? 0 : Math.round((done/total)*100);
  return (
    <div style={{ marginTop:6 }}>
      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
        <span style={{ fontSize:10, color:"#7a7a8a" }}>Docs ready</span>
        <span style={{ fontSize:10, color:"#666", fontFamily:"monospace" }}>{done}/{total}</span>
      </div>
      <div style={{ height:3, background:"#d9d2c5", borderRadius:4 }}>
        <div style={{ height:"100%", width:`${pct}%`, background: pct===100 ? "#44dd88" : "#6b8cff", borderRadius:4, transition:"width 0.4s" }} />
      </div>
    </div>
  );
}

const STORAGE_KEY = "counselling-tracker-v1";
function loadSaved() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch { return {}; }
}
function saveData(apps) {
  const compact = {};
  apps.forEach(a => {
    compact[a.id] = { status:a.status, idpSubmitted:a.idpSubmitted, docsUploaded:a.docsUploaded, notes:a.notes, offerExpiry:a.offerExpiry||"", prereqs:Object.fromEntries(a.prereqs.map(p=>[p.id,p.done])) };
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(compact));
}

                  <div style={{ display:"flex", alignItems:"center", gap:6, flexShrink:0 }}>
                    <span style={{ fontSize:10, padding:"3px 8px", borderRadius:20, border:`1px solid ${sc.border}`, background:sc.bg, color:sc.text, fontFamily:"monospace" }}>{app.status}</span>
                    <span style={{ color:"#7a7a8a", fontSize:10 }}>{isExpanded ? "▲" : "▼"}</span>
                  </div>
                </div>

                {isExpanded && (
                  <div style={{ borderTop:"1px solid #d9d2c5" }}>
                    <div style={{ padding:"10px 16px", display:"flex", gap:16, flexWrap:"wrap", borderBottom:"1px solid #f0ebe3", alignItems:"center" }}>
                      <div>
                        <div style={{ fontSize:10, color:"#7a7a8a", letterSpacing:1, textTransform:"uppercase", marginBottom:4 }}>Status</div>
                        <select value={app.status} onChange={e=>update(app.id,"status",e.target.value)} style={{ background:"#eef0fa", border:"1px solid #c4bdb0", color:"#2a2a3e", borderRadius:6, padding:"4px 8px", fontSize:12, cursor:"pointer", fontFamily:"monospace" }}>
                          {STATUS_OPTIONS.map(s=><option key={s}>{s}</option>)}
                        </select>
                      </div>
                      <div>
                        <div style={{ fontSize:10, color:"#7a7a8a", letterSpacing:1, textTransform:"uppercase", marginBottom:4 }}>IDP Submitted</div>
                        <div style={{ display:"flex", gap:5 }}>
                          {[true,false].map(v=>(
                            <button key={String(v)} onClick={()=>update(app.id,"idpSubmitted",v)} style={{ padding:"3px 10px", borderRadius:6, cursor:"pointer", fontSize:11, border: app.idpSubmitted===v ? "1px solid #6b8cff" : "1px solid #d9d2c5", background: app.idpSubmitted===v ? "#eceeff" : "#f5f2ed", color: app.idpSubmitted===v ? "#6b8cff" : "#6c6c8a", fontFamily:"monospace" }}>{v?"Yes":"No"}</button>
                          ))}
                        </div>
                      </div>
                      <div>
                        <div style={{ fontSize:10, color:"#7a7a8a", letterSpacing:1, textTransform:"uppercase", marginBottom:4 }}>Offer Expiry</div>
                        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                          <input type="date" value={app.offerExpiry||""} onChange={e=>update(app.id,"offerExpiry",e.target.value)}
                            style={{ background:"#fff", border:"1px solid #c4bdb0", color:"#2a2a3e", borderRadius:6, padding:"3px 8px", fontSize:11, fontFamily:"monospace", cursor:"pointer" }} />
                          {app.offerExpiry && (() => {
                            const days = Math.ceil((new Date(app.offerExpiry) - new Date()) / (1000*60*60*24));
                            const color = days<0 ? "#999" : days<=7 ? "#e05050" : days<=14 ? "#e07820" : "#2a9d5c";
                            const label = days<0 ? "Expired" : days===0 ? "Today!" : `${days}d left`;
                            return <span style={{ fontSize:11, fontFamily:"monospace", fontWeight:700, color }}>{label}</span>;
                          })()}
                        </div>
                      </div>
                      <a href={app.link} target="_blank" rel="noreferrer" style={{ fontSize:11, color:"#6b8cff", textDecoration:"none", marginLeft:"auto" }}>→ Program page ↗</a>
                    </div>

                    <div style={{ padding:"7px 16px", background:"#f5f0e8", fontSize:11, color:"#888899", borderBottom:"1px solid #f0ebe3" }}>
                      📋 {app.applicationNote}
                    </div>

                    <div style={{ display:"flex", borderBottom:"1px solid #d9d2c5" }}>
                      {["requirements","documents","pre-reqs","notes"].map(t=>(
                        <button key={t} onClick={()=>setTab(app.id,t)} style={{ padding:"9px 14px", background:"transparent", border:"none", borderBottom: tab===t ? "2px solid #6b8cff" : "2px solid transparent", color: tab===t ? "#6b8cff" : "#6c6c8a", cursor:"pointer", fontSize:10, textTransform:"uppercase", letterSpacing:1, fontFamily:"monospace" }}>{t}</button>
                      ))}
                    </div>

                    <div style={{ padding:"14px 16px" }}>
                      {tab === "requirements" && (
                        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
                          <div>
                            <div style={{ fontSize:10, color:"#ffaa44", letterSpacing:2, textTransform:"uppercase", marginBottom:7 }}>Academic Entry</div>
                            {app.requirements.academic.map((r,i)=>(
                              <div key={i} style={{ fontSize:12, color:"#444", marginBottom:6, paddingLeft:10, borderLeft:"2px solid #d9d2c5", lineHeight:1.5 }}>{r}</div>
                            ))}
                            <div style={{ marginTop:12, fontSize:10, color:"#6b8cff", letterSpacing:2, textTransform:"uppercase", marginBottom:7 }}>English Proficiency</div>
                            {app.requirements.english.map((r,i)=>(
                              <div key={i} style={{ fontSize:12, color: r.includes("⚠️") ? "#c07800" : "#444", marginBottom:5, paddingLeft:10, borderLeft:`2px solid ${r.includes("⚠️") ? "#e8a96a" : "#d9d2c5"}`, lineHeight:1.5 }}>{r}</div>
                            ))}
                          </div>
                          <div>
                            <div style={{ fontSize:10, color:"#ff6b6b", letterSpacing:2, textTransform:"uppercase", marginBottom:7 }}>Notes & Flags</div>
                            {app.requirements.extra.map((r,i)=>(
                              <div key={i} style={{ fontSize:12, color: r.includes("⚠️") ? "#c07800" : "#555", marginBottom:6, paddingLeft:10, borderLeft:`2px solid ${r.includes("⚠️") ? "#e8a96a" : "#d9d2c5"}`, lineHeight:1.5 }}>{r}</div>
                            ))}
                          </div>
                        </div>
                      )}

                      {tab === "documents" && (
                        <div>
                          {app.requirements.documents.map(doc=>(
                            <div key={doc} onClick={()=>toggleDoc(app.id,doc)} style={{ display:"flex", alignItems:"center", gap:10, padding:"7px 0", cursor:"pointer", borderBottom:"1px solid #f0ebe3" }}>
                              <div style={{ width:14, height:14, borderRadius:3, border:`1px solid ${app.docsUploaded.includes(doc) ? "#44dd88" : "#c4bdb0"}`, background: app.docsUploaded.includes(doc) ? "#44dd8822" : "transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                                {app.docsUploaded.includes(doc) && <span style={{ fontSize:9, color:"#44dd88" }}>✓</span>}
                              </div>
                              <span style={{ fontSize:13, color: app.docsUploaded.includes(doc) ? "#999" : "#2a2a3e", textDecoration: app.docsUploaded.includes(doc) ? "line-through" : "none" }}>{doc}</span>
                            </div>
                          ))}
                          <div style={{ marginTop:10 }}><ProgressBar total={app.requirements.documents.length} done={app.docsUploaded.length} /></div>
                        </div>
                      )}

                      {tab === "pre-reqs" && (
                        <div>
                          <p style={{ fontSize:11, color:"#7a7a8a", margin:"0 0 12px", fontStyle:"italic" }}>Tasks to complete before or alongside your application. Click to mark done.</p>
                          {app.prereqs.map(p=>(
                            <div key={p.id} onClick={()=>togglePrereq(app.id,p.id)} style={{ display:"flex", alignItems:"flex-start", gap:10, padding:"10px 0", cursor:"pointer", borderBottom:"1px solid #f0ebe3" }}>
                              <div style={{ width:14, height:14, borderRadius:3, border:`1px solid ${p.done ? "#44dd88" : "#c4bdb0"}`, background: p.done ? "#44dd8822" : "transparent", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, marginTop:2 }}>
                                {p.done && <span style={{ fontSize:9, color:"#44dd88" }}>✓</span>}
                              </div>
                              <div style={{ flex:1 }}>
                                <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                                  <span style={{ fontSize:13, color: p.done ? "#999" : "#2a2a3e", textDecoration: p.done ? "line-through" : "none" }}>{p.label}</span>
                                  {p.flag && <span style={{ fontSize:10, color:"#c07800", border:"1px solid #e8a96a", background:"#fff3e0", padding:"1px 7px", borderRadius:10, fontFamily:"monospace", whiteSpace:"nowrap" }}>{p.flag}</span>}
                                </div>
                                <div style={{ fontSize:11, color:"#7a7a8a", marginTop:3, lineHeight:1.5 }}>{p.note}</div>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}

                      {tab === "notes" && (
                        <div>
                          {editingNote === app.id ? (
                            <div>
                              <textarea value={noteText} onChange={e=>setNoteText(e.target.value)} rows={4} style={{ width:"100%", background:"#eef0fa", border:"1px solid #c4bdb0", color:"#2a2a3e", borderRadius:6, padding:10, fontSize:13, resize:"vertical", boxSizing:"border-box", fontFamily:"Georgia, serif" }} />
                              <div style={{ display:"flex", gap:8, marginTop:6 }}>
                                <button onClick={()=>{ update(app.id,"notes",noteText); setEditingNote(null); }} style={{ padding:"5px 12px", background:"#eceeff", border:"1px solid #6b8cff", color:"#6b8cff", borderRadius:6, cursor:"pointer", fontSize:11 }}>Save</button>
                                <button onClick={()=>setEditingNote(null)} style={{ padding:"5px 12px", background:"transparent", border:"1px solid #d9d2c5", color:"#7a7a8a", borderRadius:6, cursor:"pointer", fontSize:11 }}>Cancel</button>
                              </div>
                            </div>
                          ) : (
                            <div onClick={()=>{ setEditingNote(app.id); setNoteText(app.notes); }} style={{ minHeight:48, padding:"10px 12px", background:"#faf7f2", border:"1px solid #d9d2c5", borderRadius:6, cursor:"text", fontSize:13, color: app.notes ? "#444" : "#b0a898", fontStyle: app.notes ? "normal" : "italic" }}>
                              {app.notes || "Click to add notes — interview dates, contacts, follow-ups..."}
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
